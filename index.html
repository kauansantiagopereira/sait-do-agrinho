<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Agrinho 2026</title>
    <style>
        /* Estilos modernos e limpos com temática voltada à agricultura/tecnologia */
        :root {
            --cor-primaria: #2e7d32; /* Verde sustentável */
            --cor-secundaria: #1b5e20;
            --cor-fundo: #f4f6f4;
            --cor-texto: #333333;
            --cor-card: #ffffff;
            --cor-borda: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            line-height: 1.6;
        }

        header {
            background-color: var(--cor-primaria);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        header h1 {
            margin: 0;
            font-size: 2.6rem;
            letter-spacing: 0.5px;
        }

        header p {
            margin: 0.5rem 0 0 0;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            background: var(--cor-card);
            padding: 2rem;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            border: 1px solid var(--cor-borda);
        }

        h2 {
            color: var(--cor-secundaria);
            border-bottom: 2px solid var(--cor-primaria);
            padding-bottom: 0.5rem;
            margin-top: 0;
            font-size: 1.6rem;
        }
